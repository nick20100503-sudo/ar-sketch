<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR 邊緣線稿描摹網</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #ui-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 10px; width: 85%; max-width: 340px;
        }
        .control-row { display: flex; align-items: center; justify-content: space-between; }
        label { font-size: 13px; font-weight: bold; color: #333; }
        input[type="range"] { width: 55%; }
        input[type="file"] { font-size: 12px; width: 60%; }
        .btn { background: #007bff; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .btn.active { background: #28a745; }
        .hints { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.6); color: white; padding: 8px 12px; border-radius: 6px; font-size: 12px; pointer-events: none; }
        #hidden-canvas { display: none; }
    </style>
</head>
<body>
    <div class="hints">💡 提示：上傳圖片後，點擊「切換線稿」可自動提取邊緣輪廓！</div>
    <canvas id="hidden-canvas"></canvas>
    <div id="ui-container">
        <div class="control-row"><label for="image-loader">上傳圖片:</label><input type="file" id="image-loader" accept="image/*"></div>
        <div class="control-row"><label>圖片模式:</label><button id="filter-btn" class="btn">原圖模式</button></div>
        <div class="control-row" id="threshold-row" style="display: none;"><label for="threshold-slider">線條細節:</label><input type="range" id="threshold-slider" min="10" max="150" step="5" value="40"></div>
        <div class="control-row"><label for="opacity-slider">透明度:</label><input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" value="0.6"></div>
        <div class="control-row"><label for="scale-slider">圖片大小:</label><input type="range" id="scale-slider" min="0.5" max="3" step="0.1" value="1.5"></div>
    </div>
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets><img id="user-uploaded-img" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><rect width='100' height='100' fill='%23cccccc'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='10' fill='%23666666'>請上傳圖片</text></svg>"></a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false">
            <a-image id="ar-patch" src="#user-uploaded-img" position="0 0 -2" scale="1.5 1.5 1" material="transparent: true; opacity: 0.6;"></a-image>
        </a-camera>
    </a-scene>
    <script>
        const imageLoader = document.getElementById('image-loader');
        const opacitySlider = document.getElementById('opacity-slider');
        const scaleSlider = document.getElementById('scale-slider');
        const thresholdSlider = document.getElementById('threshold-slider');
        const filterBtn = document.getElementById('filter-btn');
        const thresholdRow = document.getElementById('threshold-row');
        const arImage = document.getElementById('ar-patch');
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');
        let originalImgDataUrl = null, currentImageObject = null, isLineMode = false;
        imageLoader.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                originalImgDataUrl = event.target.result;
                currentImageObject = new Image();
                currentImageObject.onload = function() {
                    const aspect = currentImageObject.width / currentImageObject.height;
                    if (aspect > 1) { arImage.setAttribute('width', aspect); arImage.setAttribute('height', 1); }
                    else { arImage.setAttribute('width', 1); arImage.setAttribute('height', 1 / aspect); }
                    renderImage();
                };
                currentImageObject.src = originalImgDataUrl;
            };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });
        filterBtn.addEventListener('click', function() {
            if (!originalImgDataUrl) return alert("請先上傳圖片！");
            isLineMode = !isLineMode;
            if (isLineMode) { filterBtn.innerText = "線稿模式"; filterBtn.classList.add('active'); thresholdRow.style.display = 'flex'; }
            else { filterBtn.innerText = "原圖模式"; filterBtn.classList.remove('active'); thresholdRow.style.display = 'none'; }
            renderImage();
        });
        thresholdSlider.addEventListener('input', function() { if (isLineMode && currentImageObject) renderImage(); });
        function renderImage() {
            if (!currentImageObject) return;
            if (!isLineMode) { arImage.setAttribute('src', originalImgDataUrl); }
            else {
                const w = currentImageObject.width, h = currentImageObject.height; canvas.width = w; canvas.height = h;
                ctx.drawImage(currentImageObject, 0, 0, w, h); const imgData = ctx.getImageData(0, 0, w, h);
                const edgeData = sobelFilter(imgData, parseInt(thresholdSlider.value)); ctx.putImageData(edgeData, 0, 0);
                arImage.setAttribute('src', canvas.toDataURL());
            }
        }
        function sobelFilter(imgData, threshold) {
            const w = imgData.width, h = imgData.height, src = imgData.data, output = ctx.createImageData(w, h), dst = output.data;
            const gray = new Uint8ClampedArray(w * h);
            for (let i = 0; i < src.length; i += 4) { gray[i / 4] = 0.299 * src[i] + 0.587 * src[i + 1] + 0.114 * src[i + 2]; }
            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const idx = y * w + x;
                    const valX = (-1 * gray[idx - w - 1] + 1 * gray[idx - w + 1] + -2 * gray[idx - 1] + 2 * gray[idx + 1] + -1 * gray[idx + w - 1] + 1 * gray[idx + w + 1]);
                    const valY = (-1 * gray[idx - w - 1] - 2 * gray[idx - w] - 1 * gray[idx - w + 1] + 1 * gray[idx + w - 1] + 2 * gray[idx + w] + 1 * gray[idx + w + 1]);
                    const mag = Math.sqrt(valX * valX + valY * valY); const pixelIdx = idx * 4;
                    if (mag > threshold) { dst[pixelIdx] = 0; dst[pixelIdx + 1] = 0; dst[pixelIdx + 2] = 0; dst[pixelIdx + 3] = 255; }
                    else { dst[pixelIdx] = 255; dst[pixelIdx + 1] = 255; dst[pixelIdx + 2] = 255; dst[pixelIdx + 3] = 0; }
                }
            }
            return output;
        }
        opacitySlider.addEventListener('input', e => arImage.setAttribute('material', `transparent: true; opacity: ${e.target.value};`));
        scaleSlider.addEventListener('input', e => arImage.setAttribute('scale', `${e.target.value} ${e.target.value} 1`));
    </script>
</body>
</html>
